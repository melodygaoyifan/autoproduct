- name: store-add-list
  script: "\nimport glob, importlib, sys\nmodules = sorted(glob.glob(\"feature_*.py\"\
    )) or [\"feature.py\"]\nok = False\nfor m in modules:\n    mod = importlib.import_module(m[:-3])\n\
    \    if hasattr(mod, \"ItemStore\"):\n        store = mod.ItemStore()\n      \
    \  item_id = store.add(\"面包\")\n        assert isinstance(item_id, int) and item_id\
    \ >= 1, \"add must return an id\"\n        store.add(\"牛奶\")\n        names =\
    \ [i[\"name\"] for i in store.list_items()]\n        assert names[0] == \"牛奶\"\
    , \"list must be newest first\"\n        ok = True\nassert ok, \"no module exposed\
    \ ItemStore\"\nprint(\"store behavior ok\")\n"
